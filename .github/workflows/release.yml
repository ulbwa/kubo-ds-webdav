name: Release

# Standard Go release pipeline, triggered on a version tag.
#
# Tag format: v<kubo-version>+build.<N>  (e.g. v0.37.0+build.1). The kubo
# version is derived from the tag; the Go toolchain is derived from that kubo
# release so the published .so is ABI-compatible with the official kubo binary.
#
# Publishes, for the tag:
#   * a linux/amd64 .so plugin (the only platform Go plugins support here)
#   * kubo Docker images with the plugin bundled (linux/amd64 + linux/arm64) -> GHCR
#   * standalone kubo binaries with the plugin bundled (amd64 + arm64)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build, e.g. v0.37.0+build.1"
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.m.outputs.tag }}
      docker_tag: ${{ steps.m.outputs.docker_tag }}
      kubo_version: ${{ steps.m.outputs.kubo_version }}
      go_version: ${{ steps.m.outputs.go_version }}
      image: ${{ steps.m.outputs.image }}
    steps:
      - id: m
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Docker tags forbid '+': v0.37.0+build.1 -> v0.37.0-build.1
          echo "docker_tag=${TAG//+/-}" >> "$GITHUB_OUTPUT"

          # v0.37.0+build.1 -> v0.37.0
          KUBO_VERSION="${TAG%%+*}"
          echo "$KUBO_VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            || { echo "::error::tag '$TAG' must start with v<MAJOR>.<MINOR>.<PATCH>"; exit 1; }
          echo "kubo_version=$KUBO_VERSION" >> "$GITHUB_OUTPUT"

          # Go toolchain: kubo's go.mod 'go' directive, completed to a full
          # patch via ipfs/distributions .tool-versions when needed.
          GODIR=$(curl -fsSL "https://raw.githubusercontent.com/ipfs/kubo/${KUBO_VERSION}/go.mod" \
            | awk '/^go [0-9]/{print $2; exit}')
          if echo "$GODIR" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            GO_VERSION="$GODIR"
          else
            TV=$(curl -fsSL "https://raw.githubusercontent.com/ipfs/distributions/master/.tool-versions" \
              | awk '/^golang /{print $2; exit}')
            if echo "$TV" | grep -qE "^${GODIR}\."; then GO_VERSION="$TV"; else GO_VERSION="${GODIR}.0"; fi
          fi
          echo "go_version=$GO_VERSION" >> "$GITHUB_OUTPUT"

          echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/kubo-ds-webdav" >> "$GITHUB_OUTPUT"
          echo "::notice::tag=$TAG kubo=$KUBO_VERSION go=$GO_VERSION"

  test:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "${{ needs.meta.outputs.go_version }}"
          check-latest: true
      - name: Start the WebDAV backend
        run: docker compose up -d --wait webdav
      - name: Unit + integration tests
        env:
          WEBDAV_TEST_URL: http://127.0.0.1:8091
        run: |
          go test ./...
          go test -tags integration -timeout 600s ./...

  so:
    needs: [meta, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "${{ needs.meta.outputs.go_version }}"
          check-latest: true
      - name: Pin to the target kubo version
        run: ./set-target.sh "${{ needs.meta.outputs.kubo_version }}"
      - name: Build linux/amd64 plugin (.so)
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: amd64
        run: |
          OUT="kubo-ds-webdav_${{ needs.meta.outputs.tag }}_linux-amd64.so"
          go build -buildmode=plugin -trimpath -o "$OUT" ./plugin-main
          sha256sum "$OUT" > "$OUT.sha256"
          echo "SO=$OUT" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: plugin-so
          path: |
            ${{ env.SO }}
            ${{ env.SO }}.sha256

  bundle:
    needs: [meta, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      # QEMU lets the arm64 image's final-stage RUN (apk add) execute on the
      # amd64 runner; the Go build itself cross-compiles natively (CGO off).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build bundled image (linux/${{ matrix.arch }})
        run: |
          IMAGE="${{ needs.meta.outputs.image }}"
          # --load puts the single-arch image into the local docker store so the
          # push and binary extraction below can find it.
          docker buildx build \
            --platform "linux/${{ matrix.arch }}" \
            --build-arg KUBO_VERSION="${{ needs.meta.outputs.kubo_version }}" \
            --build-arg GO_VERSION="${{ needs.meta.outputs.go_version }}" \
            -t "${IMAGE}:${{ needs.meta.outputs.docker_tag }}-${{ matrix.arch }}" \
            --load \
            .
      - name: Push image
        run: |
          IMAGE="${{ needs.meta.outputs.image }}"
          docker push "${IMAGE}:${{ needs.meta.outputs.docker_tag }}-${{ matrix.arch }}"
      - name: Extract the bundled ipfs binary
        run: |
          IMAGE="${{ needs.meta.outputs.image }}"
          cid=$(docker create --platform "linux/${{ matrix.arch }}" "${IMAGE}:${{ needs.meta.outputs.docker_tag }}-${{ matrix.arch }}")
          BIN="kubo-ds-webdav_kubo-${{ needs.meta.outputs.kubo_version }}_linux-${{ matrix.arch }}"
          docker cp "$cid:/usr/local/bin/ipfs" "$BIN"
          docker rm "$cid" >/dev/null
          chmod +x "$BIN"
          sha256sum "$BIN" > "$BIN.sha256"
          echo "BIN=$BIN" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.arch }}
          path: |
            ${{ env.BIN }}
            ${{ env.BIN }}.sha256

  manifest:
    needs: [meta, bundle]
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest tags
        run: |
          IMAGE="${{ needs.meta.outputs.image }}"
          DTAG="${{ needs.meta.outputs.docker_tag }}"
          KUBO="${{ needs.meta.outputs.kubo_version }}"
          for ref in "$DTAG" "$KUBO" "latest"; do
            docker buildx imagetools create -t "${IMAGE}:${ref}" \
              "${IMAGE}:${DTAG}-amd64" "${IMAGE}:${DTAG}-arm64"
          done

  release:
    needs: [meta, so, bundle, manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Compose release notes
        run: |
          IMAGE="${{ needs.meta.outputs.image }}"
          {
            echo "<!-- build-meta"
            echo "kubo_version: ${{ needs.meta.outputs.kubo_version }}"
            echo "go_version: ${{ needs.meta.outputs.go_version }}"
            echo "-->"
            echo
            echo "kubo **${{ needs.meta.outputs.kubo_version }}** with the **webdavds** datastore."
            echo
            echo "| Artifact | Notes |"
            echo "|---|---|"
            echo "| \`.so\` plugin | linux/amd64 only; load into the matching official kubo ${{ needs.meta.outputs.kubo_version }} |"
            echo "| Docker image | \`docker pull ${IMAGE}:${{ needs.meta.outputs.kubo_version }}\` (amd64+arm64) |"
            echo "| Bundled binary | drop-in \`ipfs\` with webdavds compiled in (amd64+arm64) |"
            echo
            echo "Built with Go \`${{ needs.meta.outputs.go_version }}\`. See the README to configure the \`webdavds\` datastore."
          } > notes.md
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: "kubo-ds-webdav · kubo ${{ needs.meta.outputs.kubo_version }}"
          body_path: notes.md
          files: dist/**
